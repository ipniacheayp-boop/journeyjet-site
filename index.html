<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tripile.com – Buy Cheap Flights, Hotels &amp; Car Rentals | Best US Travel Deals</title>
    <meta name="description" content="Buy cheap flights, hotels &amp; car rentals across the USA on Tripile.com. Compare 500+ airlines, get Price Match Guarantee, and save up to 46%. Trusted by 2M+ travelers." />
    <meta name="keywords" content="cheap flights USA, flight deals, book flights online, US travel deals, last-minute flights, discounted airline tickets, cheap hotels, car rentals USA, travel booking, airfare deals, best flight prices, domestic flights USA, international flights from USA" />
    <meta name="author" content="Tripile.com" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="bingbot" content="index, follow" />

    <!-- Preconnect to external origins for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload critical font files for faster LCP -->
    <link rel="preload" href="https://fonts.gstatic.com/s/inter/v18/UcC73FwrK3iLTeHuS_nVMrMxCp50SjIa1ZL7W0Q5nw.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Fonts with display=swap for faster text rendering -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" /></noscript>

    <!-- Open Graph (Facebook, LinkedIn, etc.) — single set, absolute URLs -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tripile.com/" />
    <meta property="og:title" content="Tripile.com – Buy Cheap Flights, Hotels &amp; Car Rentals | Best US Travel Deals" />
    <meta property="og:description" content="Buy cheap flights, hotels &amp; car rentals across the USA on Tripile.com. Compare 500+ airlines, get Price Match Guarantee, and save up to 46%. Trusted by 2M+ travelers." />
    <meta property="og:image" content="https://tripile.com/og-image.png" />
    <meta property="og:image:secure_url" content="https://tripile.com/og-image.png" />
    <meta property="og:site_name" content="Tripile.com" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@tripile" />
    <meta name="twitter:creator" content="@tripile" />
    <meta name="twitter:title" content="Tripile.com – Buy Cheap Flights, Hotels &amp; Car Rentals | Best US Travel Deals" />
    <meta name="twitter:description" content="Buy cheap flights, hotels &amp; car rentals across the USA on Tripile.com. Compare 500+ airlines, get Price Match Guarantee, and save up to 46%. Trusted by 2M+ travelers." />
    <meta name="twitter:image" content="https://tripile.com/og-image.png" />

    <!-- Legacy link preview hint (some crawlers) -->
    <link rel="image_src" href="https://tripile.com/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://tripile.com/" />

    <!-- Machine-readable site summary for AI assistants (llms.txt) -->
    <link rel="alternate" type="text/plain" title="Tripile for AI systems" href="/llms.txt" />

    <!-- Additional SEO Meta -->
    <meta name="geo.region" content="US" />
    <meta name="geo.placename" content="United States" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="1 days" />
    <meta name="rating" content="general" />
    <meta name="distribution" content="global" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0B66FF" />
    <meta name="msapplication-TileColor" content="#0B66FF" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-tripile.png?v=4" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-tripile.png?v=4" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-tripile.png?v=4" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Structured Data: TravelAgency (homepage — Google Rich Results / Facebook) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "TravelAgency",
        "name": "Tripile",
        "url": "https://tripile.com",
        "logo": "https://tripile.com/og-image.png",
        "description": "Buy cheap flights, hotels \u0026 car rentals across the USA on Tripile.com."
      }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Tripile.com",
        "url": "https://tripile.com",
        "logo": "https://tripile.com/favicon-tripile.png",
        "description": "Tripile.com helps you find the best flight deals, hotel discounts, and car rentals across the USA.",
        "sameAs": [
          "https://facebook.com/tripile",
          "https://twitter.com/tripile",
          "https://instagram.com/tripile"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+1-800-963-4330",
          "contactType": "customer service",
          "areaServed": "US",
          "availableLanguage": ["English", "Spanish"]
        }
      }
    </script>

    <!-- Structured Data: WebSite with SearchAction -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Tripile.com",
        "url": "https://tripile.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://tripile.com/search-results?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Structured Data: BreadcrumbList -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "https://tripile.com"
          },
          {
            "@type": "ListItem",
            "position": 2,
            "name": "Flight Deals",
            "item": "https://tripile.com/deals"
          },
          {
            "@type": "ListItem",
            "position": 3,
            "name": "Reviews",
            "item": "https://tripile.com/reviews"
          },
          {
            "@type": "ListItem",
            "position": 4,
            "name": "Blog",
            "item": "https://tripile.com/blog"
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
