<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 220" width="660" height="220">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ADE8"/>
      <stop offset="100%" style="stop-color:#0072D6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#0056AA" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="220" rx="28" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Wordmark -->
  <text
    x="330"
    y="128"
    font-family="'Trebuchet MS','Century Gothic',sans-serif"
    font-size="100"
    font-weight="800"
    letter-spacing="-3"
    fill="white"
    text-anchor="middle"
  >Tripile</text>

  <!-- .com -->
  <text
    x="330"
    y="176"
    font-family="'Trebuchet MS',sans-serif"
    font-size="30"
    font-weight="300"
    letter-spacing="8"
    fill="rgba(255,255,255,0.62)"
    text-anchor="middle"
  >.com</text>

  <!-- Underline accent -->
  <rect x="210" y="190" width="240" height="3" rx="2" fill="rgba(255,255,255,0.22)"/>
</svg>
