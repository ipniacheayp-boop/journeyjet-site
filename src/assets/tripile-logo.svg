<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <linearGradient id="bgBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ADE8"/>
      <stop offset="100%" style="stop-color:#0078C8"/>
    </linearGradient>
    <filter id="sh3">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#004080" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Brand Blue Background -->
  <rect width="420" height="120" fill="url(#bgBlue)" rx="16"/>

  <!-- Icon Badge -->
  <rect x="10" y="15" width="90" height="90" rx="22" fill="rgba(255,255,255,0.2)" filter="url(#sh3)"/>

  <!-- Airplane icon -->
  <ellipse cx="55" cy="60" rx="22" ry="7" fill="white" opacity="0.95" transform="rotate(-35 55 60)"/>
  <polygon points="55,57 72,48 68,58 55,62" fill="white" opacity="0.95"/>
  <polygon points="36,67 44,55 46,68" fill="white" opacity="0.9"/>
  <polygon points="52,65 60,70 54,70" fill="white" opacity="0.75"/>

  <!-- Wordmark -->
  <text x="115" y="74" font-family="'Trebuchet MS', sans-serif" font-size="46" font-weight="700" letter-spacing="-1" fill="#FFFFFF">Tripile</text>
  <text x="320" y="74" font-family="'Trebuchet MS', sans-serif" font-size="30" font-weight="400" fill="rgba(255,255,255,0.75)">.com</text>

  <!-- Tagline -->
  <text x="116" y="95" font-family="'Trebuchet MS', sans-serif" font-size="13" fill="rgba(255,255,255,0.65)" letter-spacing="2.5">TRAVEL SMARTER</text>
</svg>
