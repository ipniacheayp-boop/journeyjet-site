<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ADE8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0078C8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F4FF;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00ADE8" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Icon Badge -->
  <rect x="10" y="15" width="90" height="90" rx="22" ry="22" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Airplane icon (stylized, centered in badge) -->
  <!-- Fuselage -->
  <ellipse cx="55" cy="60" rx="22" ry="7" fill="url(#iconGrad)" transform="rotate(-35 55 60)"/>
  <!-- Wing -->
  <polygon points="55,57 72,48 68,58 55,62" fill="white" opacity="0.95"/>
  <!-- Tail fin -->
  <polygon points="36,67 44,55 46,68" fill="white" opacity="0.9"/>
  <!-- Small wing detail -->
  <polygon points="52,65 60,70 54,70" fill="white" opacity="0.75"/>

  <!-- Wordmark: "Tripile" -->
  <text
    x="115"
    y="74"
    font-family="'Trebuchet MS', 'Gill Sans', sans-serif"
    font-size="46"
    font-weight="700"
    letter-spacing="-1"
    fill="#0D2B55"
  >Tripile</text>

  <!-- ".com" suffix in brand blue -->
  <text
    x="320"
    y="74"
    font-family="'Trebuchet MS', 'Gill Sans', sans-serif"
    font-size="30"
    font-weight="400"
    fill="#00ADE8"
    letter-spacing="0"
  >.com</text>

  <!-- Tagline -->
  <text
    x="116"
    y="95"
    font-family="'Trebuchet MS', Arial, sans-serif"
    font-size="13"
    font-weight="400"
    fill="#5A7FAA"
    letter-spacing="2.5"
  >TRAVEL SMARTER</text>
</svg>
