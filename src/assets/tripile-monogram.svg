<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ADE8"/>
      <stop offset="100%" style="stop-color:#0072D6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#00ADE8" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Badge -->
  <rect x="25" y="25" width="250" height="250" rx="52" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- T crossbar -->
  <rect x="50" y="88" width="200" height="24" rx="12" fill="white"/>
  <!-- T stem -->
  <rect x="108" y="88" width="24" height="162" rx="12" fill="white"/>
  <!-- I stem -->
  <rect x="168" y="112" width="22" height="138" rx="11" fill="white" opacity="0.92"/>
  <!-- I dot -->
  <circle cx="179" cy="72" r="18" fill="white" filter="url(#glow)"/>
</svg>
